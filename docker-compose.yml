

services:
  postgres:
    image: postgres:16
    container_name: market-place
    restart: always
    environment:
      POSTGRES_USER: market-place
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: market-place
    ports:
      - "3306:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: